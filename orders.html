<!DOCTYPE html>

<html lang="en">
    
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Haven Bookstore</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <header>

        <img src="images/notebook.png" alt="Book Haven logo">

        <h1>Book Haven Bookstore</h1>

        <nav>

            <a href="index.html">Home</a>

            <a href="gallery.html">Gallery</a>

            <a href="about.html">About Us</a>

            <a href="gallery.html" id="header-cart-link">🛒 Cart</a>

        </nav>

    </header>

    <main>

        <section>

            <h2>Special Orders</h2>
    
            <p>
                Looking for a specific book or item?
                Send us your special order request!
            </p>
    
        </section>
    
        <section>
    
            <form id="contact-form">
    
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br><br>
    
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br><br>
    
                <label for="item">Book or Item Type:</label><br>
                <input type="text" id="item" name="item" required><br><br>
    
                <label for="details">Details:</label><br>
                <textarea id="details" name="details" required></textarea><br><br>
    
                <button id="contact-submit-button" type="submit">
                    Submit Request
                </button>
    
            </form>
    
        </section>

    </main>

    <footer>

        <nav>

            <a href="index.html">Home</a>

            <a href="gallery.html">Gallery</a>

            <a href="about.html">About Us</a>

            <a href="orders.html">Orders</a>

            <a href="gallery.html">🛒 Cart</a>


        </nav>

        <p>Book Haven Bookstore • EST. 2026</p>

        <button class="subscribe-button">Subscribe</button>

     </footer>

    <script src="script.js"></script>

</body>

</html>
